<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>DebateMe</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06060F;--surface:rgba(255,255,255,0.04);--surface2:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#F0EEE8;--muted:rgba(240,238,232,0.45);
  --ai:#4F8EF7;--ai-dim:rgba(79,142,247,0.12);--ai-border:rgba(79,142,247,0.25);
  --user:#34D399;--user-dim:rgba(52,211,153,0.1);--user-border:rgba(52,211,153,0.22);
  --warn:#FBBF24;--warn-dim:rgba(251,191,36,0.1);--warn-border:rgba(251,191,36,0.25);
  --danger:#F87171;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;display:flex;flex-direction:column;position:relative}

#canvas-bg{position:fixed;inset:0;z-index:0;pointer-events:none}

.layer{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ── HEADER ── */
header{
  padding:16px 32px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
  backdrop-filter:blur(20px);
  background:rgba(6,6,15,0.6);
}
.logo{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;letter-spacing:-0.5px}
.logo em{color:var(--ai);font-style:normal}
.hdr-right{display:flex;align-items:center;gap:16px}
.turn-pill{
  font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:20px;padding:4px 12px;color:var(--muted);
  opacity:0;transition:opacity .3s;
}
.turn-pill.show{opacity:1}

/* ── SCREENS ── */
.screen{display:none;flex:1;overflow:hidden}
.screen.active{display:flex}

/* ── SETUP ── */
#setup-screen{align-items:center;justify-content:center;padding:32px 24px}
.setup-wrap{width:100%;max-width:480px}

.badge{
  display:inline-block;
  font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:2.5px;text-transform:uppercase;color:var(--ai);
  border:1px solid var(--ai-border);border-radius:20px;
  padding:4px 12px;margin-bottom:20px;
  background:var(--ai-dim);
}
.setup-title{
  font-family:'Space Grotesk',sans-serif;font-size:38px;font-weight:700;
  letter-spacing:-1.5px;line-height:1.1;margin-bottom:10px;
}
.setup-title span{
  background:linear-gradient(135deg,var(--ai),var(--user));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.setup-sub{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:32px}

.field{margin-bottom:18px}
label{
  display:block;font-family:'Space Grotesk',sans-serif;
  font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);margin-bottom:8px;
}
input,textarea{
  width:100%;background:var(--surface);
  border:1px solid var(--border);border-radius:10px;
  color:var(--text);font-family:'Inter',sans-serif;font-size:14px;
  padding:11px 14px;transition:border-color .2s,box-shadow .2s;
  outline:none;resize:none;
}
input:focus,textarea:focus{
  border-color:var(--ai);
  box-shadow:0 0 0 3px rgba(79,142,247,0.12);
}
input::placeholder,textarea::placeholder{color:var(--muted)}

.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
.chip{
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:5px 12px;font-size:12px;
  color:var(--muted);cursor:pointer;transition:all .2s;
}
.chip:hover{border-color:var(--ai);color:var(--text);background:var(--ai-dim)}

.btn-start{
  width:100%;background:var(--ai);border:none;border-radius:10px;
  color:#fff;font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;
  padding:14px;cursor:pointer;margin-top:6px;
  transition:opacity .2s,transform .15s,box-shadow .2s;
  box-shadow:0 0 24px rgba(79,142,247,0.3);
}
.btn-start:hover{opacity:.92;box-shadow:0 0 36px rgba(79,142,247,0.45)}
.btn-start:active{transform:scale(.98)}
.btn-start:disabled{opacity:.35;cursor:not-allowed;box-shadow:none}

/* ── DEBATE ── */
#debate-screen{flex-direction:column}

.str-bar{
  padding:10px 32px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;flex-shrink:0;
  backdrop-filter:blur(16px);background:rgba(6,6,15,0.5);
}
.str-label{font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);white-space:nowrap}
.str-track{flex:1;height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden}
.str-fill{height:100%;background:var(--user);border-radius:2px;transition:width .7s cubic-bezier(.4,0,.2,1),background .4s;width:70%}
.str-num{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;color:var(--user);width:34px;text-align:right;transition:color .4s}

.chat{flex:1;overflow-y:auto;padding:24px 32px;display:flex;flex-direction:column;gap:14px}
.chat::-webkit-scrollbar{width:3px}
.chat::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px}

.bubble{
  max-width:70%;border-radius:14px;padding:14px 18px;
  font-size:14px;line-height:1.7;
  animation:slideUp .35s cubic-bezier(.4,0,.2,1);
}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

.bubble.user{
  background:var(--user-dim);border:1px solid var(--user-border);
  align-self:flex-end;
  box-shadow:0 4px 24px rgba(52,211,153,0.08);
}
.bubble.ai{
  background:var(--ai-dim);border:1px solid var(--ai-border);
  align-self:flex-start;
  box-shadow:0 4px 24px rgba(79,142,247,0.08);
}
.blabel{font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.bubble.user .blabel{color:var(--user)}
.bubble.ai .blabel{color:var(--ai)}

.fallacy-card{
  align-self:flex-end;max-width:70%;
  background:var(--warn-dim);border:1px solid var(--warn-border);
  border-radius:10px;padding:12px 16px;
  animation:shakeIn .5s cubic-bezier(.4,0,.2,1);
}
@keyframes shakeIn{
  0%{opacity:0;transform:translateX(10px)}
  40%{transform:translateX(-6px)}
  70%{transform:translateX(4px)}
  100%{opacity:1;transform:none}
}
.fallacy-card strong{
  font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--warn);
  display:block;margin-bottom:8px;
}
.ftag{
  display:inline-block;background:rgba(251,191,36,0.15);
  border-radius:5px;padding:2px 8px;font-size:11px;font-weight:600;
  color:var(--warn);margin:0 4px 4px 0;
}
.fexp{font-size:12px;color:rgba(251,191,36,0.75);line-height:1.5;margin-top:4px}

.typing-wrap{
  display:flex;gap:6px;align-items:center;
  background:var(--ai-dim);border:1px solid var(--ai-border);
  border-radius:14px;padding:14px 18px;align-self:flex-start;
}
.dot{
  width:7px;height:7px;background:var(--ai);border-radius:50%;opacity:.5;
  animation:pulse 1.3s ease-in-out infinite;
}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-5px);opacity:1}}

.ibar{
  padding:14px 32px 18px;border-top:1px solid var(--border);
  display:flex;gap:10px;align-items:flex-end;flex-shrink:0;
  backdrop-filter:blur(16px);background:rgba(6,6,15,0.6);
}
.ibar textarea{flex:1;min-height:42px;max-height:110px}
.btn-send{
  background:var(--ai);border:none;border-radius:10px;
  width:42px;height:42px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:opacity .2s,box-shadow .2s;
  box-shadow:0 0 16px rgba(79,142,247,0.3);
}
.btn-send:hover{opacity:.85;box-shadow:0 0 24px rgba(79,142,247,0.5)}
.btn-send:disabled{opacity:.3;cursor:not-allowed;box-shadow:none}
.btn-end{
  background:transparent;border:1px solid var(--border);border-radius:10px;
  padding:0 14px;height:42px;color:var(--muted);
  font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;
  cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0;
}
.btn-end:hover{border-color:var(--danger);color:var(--danger)}

/* ── SCORE ── */
#score-screen{flex-direction:column;overflow-y:auto;padding:40px 24px;align-items:center}
.score-wrap{width:100%;max-width:620px}

.winner-line{
  font-family:'Space Grotesk',sans-serif;font-size:30px;font-weight:700;
  letter-spacing:-0.5px;margin-bottom:6px;
  animation:revealUp .5s cubic-bezier(.4,0,.2,1);
}
@keyframes revealUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.winner-line.ai{color:var(--ai)}
.winner-line.user{color:var(--user)}
.winner-line.draw{color:var(--warn)}

.score-eyebrow{font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.score-summary{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:28px}

.fallacy-recap{
  background:var(--warn-dim);border:1px solid var(--warn-border);
  border-radius:12px;padding:18px;margin-bottom:22px;
}
.fallacy-recap-title{font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--warn);margin-bottom:12px}
.fi{margin-bottom:10px}
.fi-name{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:var(--warn);margin-bottom:2px}
.fi-exp{font-size:12px;color:rgba(251,191,36,0.7);line-height:1.5}

.score-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.score-panel{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:20px;
  transition:transform .3s,box-shadow .3s;
}
.score-panel:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.3)}
.sp-title{font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
.score-panel.user-p .sp-title{color:var(--user)}
.score-panel.ai-p .sp-title{color:var(--ai)}
.sp-total{font-family:'Space Grotesk',sans-serif;font-size:42px;font-weight:700;line-height:1}
.score-panel.user-p .sp-total{color:var(--user)}
.score-panel.ai-p .sp-total{color:var(--ai)}
.sp-max{font-size:12px;color:var(--muted);margin-bottom:14px;margin-top:2px}
.sp-row{display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:1px solid var(--border)}
.sp-row:last-of-type{border:none}
.sp-rl{color:var(--muted)}
.sp-rv{font-family:'Space Grotesk',sans-serif;font-weight:600}
.sp-verdict{font-size:12px;color:var(--muted);line-height:1.6;margin-top:12px;font-style:italic}

.btn-restart{
  width:100%;background:transparent;border:1px solid var(--border);
  border-radius:10px;color:var(--muted);
  font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:500;
  padding:13px;cursor:pointer;transition:all .2s;margin-top:4px;
}
.btn-restart:hover{border-color:var(--ai);color:var(--text)}

/* toast */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--danger);color:#fff;
  font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;
  padding:10px 20px;border-radius:10px;
  opacity:0;transition:opacity .25s;pointer-events:none;z-index:999;
  white-space:nowrap;
}
.toast.show{opacity:1}

.spin{
  width:16px;height:16px;border:2px solid rgba(255,255,255,.25);
  border-top-color:#fff;border-radius:50%;
  animation:spin .65s linear infinite;display:inline-block;
}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:600px){
  .chat{padding:14px}
  .ibar{padding:10px 14px 14px}
  .bubble{max-width:88%}
  .score-grid{grid-template-columns:1fr}
  header{padding:14px 16px}
  .str-bar{padding:8px 16px}
}
</style>
</head>
<body>

<canvas id="canvas-bg"></canvas>

<div class="layer">
  <header>
    <div class="logo">Debate<em>Me</em></div>
    <div class="hdr-right">
      <div class="turn-pill" id="turn-pill">Turn 1</div>
    </div>
  </header>

  <!-- SETUP -->
  <div class="screen active" id="setup-screen">
    <div class="setup-wrap">
      <div class="badge">AI-Powered Debate Arena</div>
      <h1 class="setup-title">Can you out-argue <span>the machine?</span></h1>
      <p class="setup-sub">Pick a topic, state your side. The AI argues back using real web articles and calls out every logical fallacy you make.</p>

      <div class="field">
        <label>Topic</label>
        <input type="text" id="topic-input" placeholder="e.g. artificial intelligence, crypto, remote work"/>
        <div class="chips">
          <div class="chip" onclick="setTopic('AI replacing jobs')">AI replacing jobs</div>
          <div class="chip" onclick="setTopic('social media')">Social media</div>
          <div class="chip" onclick="setTopic('remote work')">Remote work</div>
          <div class="chip" onclick="setTopic('crypto')">Crypto</div>
          <div class="chip" onclick="setTopic('anime')">Anime</div>
        </div>
      </div>

      <div class="field">
        <label>Your Position</label>
        <textarea id="pos-input" rows="3" placeholder="State your argument clearly — e.g. 'AI will create more jobs than it destroys'"></textarea>
      </div>

      <button class="btn-start" id="start-btn" onclick="startDebate()">Start Debate →</button>
    </div>
  </div>

  <!-- DEBATE -->
  <div class="screen" id="debate-screen">
    <div class="str-bar">
      <div class="str-label">Argument Strength</div>
      <div class="str-track"><div class="str-fill" id="str-fill"></div></div>
      <div class="str-num" id="str-num">70%</div>
    </div>
    <div class="chat" id="chat"></div>
    <div class="ibar">
      <textarea id="arg-input" rows="1" placeholder="Make your argument… (Enter to send, Shift+Enter for new line)" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="btn-send" id="send-btn" onclick="sendArg()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
      <button class="btn-end" onclick="endDebate()">End & Score</button>
    </div>
  </div>

  <!-- SCORE -->
  <div class="screen" id="score-screen">
    <div class="score-wrap" id="score-wrap"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ── PARTICLE BACKGROUND ── */
(function(){
  const c=document.getElementById('canvas-bg');
  const ctx=c.getContext('2d');
  let W,H,pts=[];
  const N=65,MAX_DIST=140;

  function resize(){
    W=c.width=innerWidth;H=c.height=innerHeight;
  }
  resize();window.addEventListener('resize',resize);

  for(let i=0;i<N;i++) pts.push({
    x:Math.random()*innerWidth,y:Math.random()*innerHeight,
    vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.35,
    r:Math.random()*1.5+.5
  });

  function draw(){
    ctx.clearRect(0,0,W,H);
    for(let i=0;i<N;i++){
      const a=pts[i];
      a.x+=a.vx;a.y+=a.vy;
      if(a.x<0||a.x>W)a.vx*=-1;
      if(a.y<0||a.y>H)a.vy*=-1;
      ctx.beginPath();
      ctx.arc(a.x,a.y,a.r,0,Math.PI*2);
      ctx.fillStyle='rgba(79,142,247,0.45)';
      ctx.fill();
      for(let j=i+1;j<N;j++){
        const b=pts[j];
        const d=Math.hypot(a.x-b.x,a.y-b.y);
        if(d<MAX_DIST){
          ctx.beginPath();
          ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);
          ctx.strokeStyle=`rgba(79,142,247,${.18*(1-d/MAX_DIST)})`;
          ctx.lineWidth=.6;ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ── APP STATE ── */
const API='http://localhost:8000/api/debate';
let sid=null,strPct=70;

function setTopic(t){document.getElementById('topic-input').value=t}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3500);
}

function autoResize(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,110)+'px';
}

function handleKey(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendArg()}
}

function esc(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function addBubble(role,text){
  const chat=document.getElementById('chat');
  const d=document.createElement('div');
  d.className=`bubble ${role}`;
  d.innerHTML=`<div class="blabel">${role==='user'?'You':'AI Opponent'}</div>${esc(text)}`;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

function addFallacy(f){
  if(!f||!f.fallacies_found)return;
  const chat=document.getElementById('chat');
  const d=document.createElement('div');
  d.className='fallacy-card';
  const tags=f.fallacies.map(x=>`<span class="ftag">${esc(x.name)}</span>`).join('');
  const exps=f.fallacies.map(x=>`<div class="fexp">• ${esc(x.explanation)}</div>`).join('');
  d.innerHTML=`<strong>⚠ Logical Fallacy Detected</strong>${tags}${exps}`;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

function addTyping(){
  const chat=document.getElementById('chat');
  const d=document.createElement('div');
  d.className='typing-wrap';d.id='typing';
  d.innerHTML='<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  chat.appendChild(d);chat.scrollTop=chat.scrollHeight;
}
function removeTyping(){const t=document.getElementById('typing');if(t)t.remove()}

function setStrength(hasFallacy){
  strPct=hasFallacy?Math.max(8,strPct-22):Math.min(96,strPct+9);
  const fill=document.getElementById('str-fill');
  const num=document.getElementById('str-num');
  fill.style.width=strPct+'%';
  num.textContent=strPct+'%';
  const color=strPct<35?'var(--danger)':strPct<60?'var(--warn)':'var(--user)';
  fill.style.background=color;
  num.style.color=color;
}

function setTurn(n){
  const p=document.getElementById('turn-pill');
  p.textContent=`Turn ${n}`;p.classList.add('show');
}

async function startDebate(){
  const topic=document.getElementById('topic-input').value.trim();
  const pos=document.getElementById('pos-input').value.trim();
  if(!topic||!pos){toast('Enter a topic and your position first.');return}
  const btn=document.getElementById('start-btn');
  btn.disabled=true;btn.innerHTML='<span class="spin"></span>';
  try{
    const r=await fetch(`${API}/start`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({topic,user_position:pos})
    });
    const d=await r.json();
    if(!r.ok)throw new Error(d.detail||'Failed to start');
    sid=d.session_id;strPct=70;
    document.getElementById('chat').innerHTML='';
    showScreen('debate-screen');
    addBubble('user',pos);
    addBubble('ai',d.ai_response);
    setTurn(1);
  }catch(e){toast(e.message);}
  finally{btn.disabled=false;btn.innerHTML='Start Debate →'}
}

async function sendArg(){
  const inp=document.getElementById('arg-input');
  const arg=inp.value.trim();
  if(!arg||!sid)return;
  const btn=document.getElementById('send-btn');
  btn.disabled=true;inp.value='';inp.style.height='auto';
  addBubble('user',arg);addTyping();
  try{
    const r=await fetch(`${API}/continue`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({session_id:sid,user_argument:arg})
    });
    const d=await r.json();
    if(!r.ok)throw new Error(d.detail||'Failed');
    removeTyping();
    if(d.fallacies&&d.fallacies.fallacies_found){addFallacy(d.fallacies);setStrength(true)}
    else setStrength(false);
    addBubble('ai',d.ai_response);
    setTurn(d.turn);
  }catch(e){removeTyping();toast(e.message);}
  finally{btn.disabled=false;inp.focus()}
}

async function endDebate(){
  if(!sid)return;
  const btn=document.querySelector('.btn-end');
  btn.disabled=true;btn.textContent='Scoring…';
  try{
    const r=await fetch(`${API}/end`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({session_id:sid})
    });
    const d=await r.json();
    if(!r.ok)throw new Error(d.detail||'Failed');
    renderScore(d.scores);
    showScreen('score-screen');
    document.getElementById('turn-pill').classList.remove('show');
  }catch(e){toast(e.message);}
  finally{btn.disabled=false;btn.textContent='End & Score'}
}

function countUp(el,target,dur=900){
  const start=performance.now();
  function step(now){
    const p=Math.min((now-start)/dur,1);
    const ease=1-Math.pow(1-p,3);
    el.textContent=Math.round(ease*target);
    if(p<1)requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function renderScore(s){
  const w=s.winner;
  const wt=w==='ai'?'AI wins this round.':w==='user'?'You win this round!':'It\'s a draw.';
  const us=s.user_score,as=s.ai_score;

  const fallacyHtml=s.fallacies_used&&s.fallacies_used.length?`
    <div class="fallacy-recap">
      <div class="fallacy-recap-title">⚠ Fallacies You Used</div>
      ${s.fallacies_used.map(f=>`
        <div class="fi">
          <div class="fi-name">${esc(f.name)}</div>
          <div class="fi-exp">${esc(f.explanation)}</div>
        </div>`).join('')}
    </div>`:'';

  document.getElementById('score-wrap').innerHTML=`
    <div class="score-eyebrow">Debate Complete</div>
    <div class="winner-line ${w}">${wt}</div>
    <div class="score-summary">${esc(s.summary)}</div>
    ${fallacyHtml}
    <div class="score-grid">
      <div class="score-panel user-p">
        <div class="sp-title">You</div>
        <div class="sp-total" id="u-total">0</div>
        <div class="sp-max">out of 40</div>
        <div class="sp-row"><span class="sp-rl">Argument strength</span><span class="sp-rv">${us.argument_strength}/10</span></div>
        <div class="sp-row"><span class="sp-rl">Evidence usage</span><span class="sp-rv">${us.evidence_usage}/10</span></div>
        <div class="sp-row"><span class="sp-rl">Logical consistency</span><span class="sp-rv">${us.logical_consistency}/10</span></div>
        <div class="sp-row"><span class="sp-rl">Handling opponent</span><span class="sp-rv">${us.handling_opponent}/10</span></div>
        <div class="sp-verdict">${esc(us.verdict)}</div>
      </div>
      <div class="score-panel ai-p">
        <div class="sp-title">AI Opponent</div>
        <div class="sp-total" id="a-total">0</div>
        <div class="sp-max">out of 40</div>
        <div class="sp-row"><span class="sp-rl">Argument strength</span><span class="sp-rv">${as.argument_strength}/10</span></div>
        <div class="sp-row"><span class="sp-rl">Evidence usage</span><span class="sp-rv">${as.evidence_usage}/10</span></div>
        <div class="sp-row"><span class="sp-rl">Logical consistency</span><span class="sp-rv">${as.logical_consistency}/10</span></div>
        <div class="sp-row"><span class="sp-rl">Handling opponent</span><span class="sp-rv">${as.handling_opponent}/10</span></div>
        <div class="sp-verdict">${esc(as.verdict)}</div>
      </div>
    </div>
    <button class="btn-restart" onclick="restart()">Start a new debate →</button>
  `;

  setTimeout(()=>{
    countUp(document.getElementById('u-total'),us.total);
    countUp(document.getElementById('a-total'),as.total);
  },200);
}

function restart(){
  sid=null;strPct=70;
  document.getElementById('topic-input').value='';
  document.getElementById('pos-input').value='';
  document.getElementById('chat').innerHTML='';
  showScreen('setup-screen');
}
</script>
</body>
</html>
